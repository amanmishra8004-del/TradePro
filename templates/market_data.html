{% extends "base.html" %}
{% block title %}Market Data{% endblock %}
{% block page_title %}Market Data{% endblock %}
{% block breadcrumb %}Market → Advanced Chart{% endblock %}

{% block content %}
<div class="market-layout">

  <!-- Control Panel -->
  <div class="card control-panel">
    <div class="card-body">
      <div class="market-controls">
        <div class="control-group" style="position: relative; flex: 1; max-width: 600px;">
          <label>Search Global Markets</label>
          <div class="input-with-icon">
            <i class="fas fa-search"></i>
            <input type="text" id="symbolSearchInput" class="form-input bhokali-glow-input" placeholder="Search Stocks, Crypto, Forex (e.g. BTCUSDT, RELIANCE, AAPL)..." autocomplete="off">
            <input type="hidden" id="symbolInput" value="BINANCE:BTCUSDT">
          </div>
          <div id="searchResults" class="search-dropdown" style="display:none; position:absolute; top:100%; left:0; right:0; background:#0d1117; border:1px solid rgba(255,255,255,0.1); border-radius:12px; z-index:100; max-height:300px; overflow-y:auto; box-shadow:0 15px 35px rgba(0,0,0,0.6); padding: 8px; margin-top: 5px;">
            <!-- Append items here -->
          </div>
        </div>
        
        <div class="control-actions" style="margin-left: auto; display: flex; gap: 10px; align-items: flex-end;">
          <button class="btn btn-primary" id="fetchBtn" onclick="updateChartFromSearch()" style="height: 42px;">
            <i class="fas fa-bolt"></i> Analyze Asset
          </button>
          <button class="btn btn-secondary" onclick="performAction('backtest')" style="height: 42px;">
            <i class="fas fa-flask"></i> Backtest
          </button>
          <button class="btn btn-secondary" onclick="performAction('risk')" style="height: 42px;">
            <i class="fas fa-shield-halved"></i> Risk Manager
          </button>
        </div>
      </div>

      <!-- Quick Ticker Suggestions -->
      <div class="market-recommendations" style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
          <h4 style="margin: 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;"><i class="fas fa-fire" style="color:var(--accent-orange)"></i> Popular Assets</h4>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-xs btn-ghost" onclick="loadRecs('crypto')">Crypto</button>
            <button class="btn btn-xs btn-ghost" onclick="loadRecs('us')">US Stocks</button>
            <button class="btn btn-xs btn-ghost" onclick="loadRecs('indian')">Indian</button>
            <button class="btn btn-xs btn-ghost" onclick="loadRecs('forex')">Forex</button>
          </div>
        </div>
        
        <div id="recContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;">
          <!-- Recommendations will render here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Main Chart Section -->
  <div class="card chart-card-container" style="border: none; background: transparent;">
    <div class="card glass-panel" style="padding: 0; overflow: hidden; height: 750px; border: 1px solid var(--border);">
      <!-- TradingView Widget BEGIN -->
      <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
        <div id="tradingview_chart" style="height: 100%; width: 100%;"></div>
      </div>
      <!-- TradingView Widget END -->
    </div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
let tvWidget = null;
let currentSymbol = "BINANCE:BTCUSDT";

function initTradingView(symbol) {
    currentSymbol = symbol || currentSymbol;
    
    // Check if it's an Indian stock selected from our search (usually ends in .NS)
    // TradingView uses NSE:SYMBOL format
    let tvSymbol = currentSymbol;
    if (tvSymbol.endsWith('.NS')) {
        tvSymbol = 'NSE:' + tvSymbol.replace('.NS', '');
    } else if (tvSymbol.endsWith('.BO')) {
        tvSymbol = 'BSE:' + tvSymbol.replace('.BO', '');
    } else if (tvSymbol.includes('-USD')) {
        tvSymbol = 'BINANCE:' + tvSymbol.replace('-USD', 'USDT');
    } else if (tvSymbol.includes('=X')) {
        tvSymbol = 'FX_IDC:' + tvSymbol.replace('=X', '');
    }

    tvWidget = new TradingView.widget({
        "autosize": true,
        "symbol": tvSymbol,
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#0d1117",
        "enable_publishing": false,
        "withdateranges": true,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "save_image": true,
        "details": true,
        "hotlist": true,
        "calendar": true,
        "show_popup_button": true,
        "popup_width": "1000",
        "popup_height": "650",
        "container_id": "tradingview_chart",
        "studies": [
            "RSI@tv-basicstudies",
            "MACD@tv-basicstudies",
            "MASimple@tv-basicstudies"
        ],
        "disabled_features": ["header_saveload"],
        "enabled_features": ["study_templates"],
        "overrides": {
            "paneProperties.background": "#0d1117",
            "paneProperties.vertGridProperties.color": "rgba(33, 38, 45, 0.5)",
            "paneProperties.horzGridProperties.color": "rgba(33, 38, 45, 0.5)",
            "symbolWatermarkProperties.transparency": 90,
            "scalesProperties.textColor": "#8b949e",
            "mainSeriesProperties.candleStyle.upColor": "#00d4aa",
            "mainSeriesProperties.candleStyle.downColor": "#ff4d6d",
            "mainSeriesProperties.candleStyle.drawWick": true,
            "mainSeriesProperties.candleStyle.drawBorder": true,
            "mainSeriesProperties.candleStyle.borderColor": "#30363d",
            "mainSeriesProperties.candleStyle.borderUpColor": "#00d4aa",
            "mainSeriesProperties.candleStyle.borderDownColor": "#ff4d6d",
            "mainSeriesProperties.candleStyle.wickUpColor": "#00d4aa",
            "mainSeriesProperties.candleStyle.wickDownColor": "#ff4d6d",
        }
    });
}

function setSymbol(sym, name) {
    document.getElementById('symbolInput').value = sym;
    document.getElementById('symbolSearchInput').value = name ? `${sym} - ${name}` : sym;
    document.getElementById('searchResults').style.display = 'none';
    
    // Update TV widget if it exists, otherwise init
    initTradingView(sym);
}

function updateChartFromSearch() {
    const val = document.getElementById('symbolSearchInput').value.split(' - ')[0].trim();
    if(val) {
        setSymbol(val.toUpperCase(), '');
    } else {
        showToast('Please enter a symbol to analyze', 'warning');
    }
}

function performAction(actionStr) {
    // Get symbol from input or widget
    let symbol = document.getElementById('symbolInput').value;
    if(!symbol || symbol === '–') return;
    
    // Clean symbol for yf (backtest / risk engine)
    let yfSymbol = symbol;
    if (yfSymbol.includes(':')) {
        // Handle TV format back to YF format
        const parts = yfSymbol.split(':');
        const exch = parts[0];
        const sym = parts[1];
        if (exch === 'NSE') yfSymbol = sym + '.NS';
        else if (exch === 'BSE') yfSymbol = sym + '.BO';
        else if (exch === 'BINANCE' && sym.endsWith('USDT')) yfSymbol = sym.replace('USDT', '-USD');
        else if (exch === 'FX_IDC') yfSymbol = sym + '=X';
        else yfSymbol = sym; // Default fallback
    }
    
    if (actionStr === 'backtest') {
        localStorage.setItem('tradeEdgeTargetSymbol', yfSymbol);
        window.location.href = "{{ url_for('backtesting') }}";
    } else if (actionStr === 'risk') {
        localStorage.setItem('tradeEdgeTargetSymbol', yfSymbol);
        window.location.href = "{{ url_for('risk_management') }}";
    }
}

// Autocomplete Logic
let searchTimer = null;
const searchInput = document.getElementById('symbolSearchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', (e) => {
    const q = e.target.value.trim();
    clearTimeout(searchTimer);
    if(q.length < 2) { searchResults.style.display = 'none'; return; }
    
    searchTimer = setTimeout(async () => {
        try {
            searchResults.innerHTML = '<div style="padding:15px; color:var(--text-muted); text-align:center;"><i class="fas fa-spinner fa-spin"></i> Searching market...</div>';
            searchResults.style.display = 'block';
            const res = await fetch(`/api/market/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            
            if(data.length === 0) {
                searchResults.innerHTML = '<div style="padding:15px; color:var(--text-muted); text-align:center;">No assets found</div>';
                return;
            }
            
            searchResults.innerHTML = data.map(item => `
                <div onclick="setSymbol('${item.symbol}', '${item.name.replace(/'/g,"\\'").replace(/"/g,"\\\"")}')" 
                     style="padding:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; align-items:center;"
                     onmouseover="this.style.background='rgba(88, 166, 255, 0.1)'" onmouseout="this.style.background='transparent'">
                    <div>
                        <div style="font-weight:bold; color:var(--text-primary);">${item.symbol}</div>
                        <div style="font-size:11px; color:var(--text-muted);">${item.name}</div>
                    </div>
                    <div style="font-size:11px; background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:4px;">
                        ${item.exchange}
                    </div>
                </div>
            `).join('');
        } catch(err) {
            searchResults.innerHTML = '<div style="padding:15px; color:var(--accent-red); text-align:center;">Search failed</div>';
        }
    }, 400);
});

async function loadRecs(cat) {
    const container = document.getElementById('recContainer');
    container.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; padding: 10px; color: var(--text-muted)"><i class="fas fa-spinner fa-spin"></i></div>';
    
    try {
        const res = await fetch(`/api/market/recommendations?category=${cat}`);
        const data = await res.json();
        
        container.innerHTML = data.assets.slice(0, 6).map(a => {
            const isUp = a.change_pct >= 0;
            return `
                <div onclick="setSymbol('${a.raw_symbol}')" 
                     style="background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; transition:all 0.2s;"
                     onmouseover="this.style.borderColor='var(--accent-green)'; this.style.transform='translateY(-2px)'"
                     onmouseout="this.style.borderColor='var(--border)'; this.style.transform='none'">
                    <div style="font-weight:700; font-size:12px; margin-bottom:2px;">${a.symbol}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-family:var(--font-mono); font-size:12px;">${a.price.toFixed(2)}</span>
                        <span class="${isUp ? 'text-green' : 'text-red'}" style="font-size:10px; font-weight:600;">
                            ${isUp?'+':''}${a.change_pct}%
                        </span>
                    </div>
                </div>
            `;
        }).join('');
    } catch(e) {
        container.innerHTML = '';
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const targetSymbol = localStorage.getItem('tradeEdgeTargetSymbol');
    if (targetSymbol) {
        setSymbol(targetSymbol);
        localStorage.removeItem('tradeEdgeTargetSymbol');
    } else {
        initTradingView("BINANCE:BTCUSDT");
    }
    loadRecs('gainers');
});

// Hide dropdown when clicking outside
document.addEventListener('click', (e) => {
    if(!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
    }
});

searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') updateChartFromSearch();
});
</script>
{% endblock %}
