{% extends "base.html" %}
{% block title %}Login | Trade Edge{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo justify-center mb-4">
        <span class="logo-icon"><i class="fas fa-chart-line"></i></span>
        <span class="logo-text">Trade<span class="logo-accent">Edge</span></span>
      </div>
      <h2>Welcome Back</h2>
      <p>Enter your credentials to access your trading edge.</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <div class="input-with-icon">
          <i class="fas fa-user"></i>
          <input type="text" name="username" class="form-input" placeholder="e.g. trader123" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-with-icon">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-right-to-bracket"></i> Login to Dashboard
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}">Create one here</a></p>
    </div>
  </div>
</div>

<style>
.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 120px);
}
.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 40px;
  box-shadow: 0 8px 32px rgba(0,212,170,0.1);
  position: relative;
  overflow: hidden;
}
.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
}
.auth-header {
  text-align: center;
  margin-bottom: 30px;
}
.auth-header .logo { justify-content: center; margin-bottom: 16px; }
.auth-header h2 { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
.auth-header p { font-size: 13px; color: var(--text-secondary); }
.auth-form { display: flex; flex-direction: column; gap: 20px; }
.btn-block { width: 100%; justify-content: center; padding: 12px; font-size: 15px; }
.auth-footer { margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-muted); }
</style>
{% endblock %}
